<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 160" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel boom</title>
  <desc>Geisoleerde pixel-boom met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Tree (pixel) -->
  <!-- shifted up by 20 to make viewBox start at y=0 -->
  <g transform="translate(0 -20)">
    <!-- trunk -->
    <rect x="40" y="110" width="30" height="70" fill="#6b4a2a"/>
    <rect x="40" y="110" width="5" height="70" fill="#4e3520"/>
    <!-- crown -->
    <rect x="10" y="20" width="90" height="30" fill="#2ea043"/>
    <rect x="0" y="50" width="110" height="30" fill="#2ea043"/>
    <rect x="10" y="80" width="90" height="30" fill="#2ea043"/>
    <rect x="20" y="30" width="70" height="10" fill="#5be66d"/>
    <rect x="10" y="60" width="90" height="10" fill="#4fda61"/>
    <rect x="20" y="90" width="70" height="10" fill="#4fda61"/>
    <!-- outline -->
    <rect x="0" y="50" width="110" height="5" fill="#111111" opacity="0.35"/>
  </g>
</svg>
