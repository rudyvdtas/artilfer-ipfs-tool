<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 90" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel koffer</title>
  <desc>Geisoleerde pixel-koffer met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Suitcase (pixel) -->
  <g>
    <!-- body -->
    <rect x="0" y="20" width="110" height="70" fill="#3d3d3d"/>
    <rect x="0" y="20" width="110" height="10" fill="#5a5a5a"/>
    <rect x="0" y="80" width="110" height="10" fill="#2a2a2a"/>
    <!-- handle -->
    <rect x="40" y="0" width="30" height="10" fill="#3d3d3d"/>
    <rect x="35" y="10" width="40" height="10" fill="#3d3d3d"/>
    <!-- latch -->
    <rect x="50" y="45" width="10" height="10" fill="#f2d66c"/>
    <!-- strap -->
    <rect x="52" y="20" width="6" height="70" fill="#1b1b1b"/>
    <!-- sticker vibe -->
    <rect x="15" y="38" width="20" height="15" fill="#ff63c3"/>
    <rect x="18" y="41" width="14" height="9" fill="#ff8be0"/>
  </g>
</svg>
