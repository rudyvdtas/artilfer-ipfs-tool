<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel library</title>
  <desc>Pixel-boekenkast icoon met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <g>
    <!-- bookshelf frame -->
    <rect x="10" y="5" width="140" height="150" fill="#8b6a4a"/>
    <rect x="10" y="5" width="140" height="6" fill="#a37c56"/>
    <rect x="10" y="5" width="6" height="150" fill="#a37c56"/>
    <rect x="144" y="5" width="6" height="150" fill="#6b4a2a"/>
    <rect x="10" y="149" width="140" height="6" fill="#5b3e24"/>

    <!-- shelf planks -->
    <rect x="16" y="52" width="128" height="6" fill="#a37c56"/>
    <rect x="16" y="52" width="128" height="3" fill="#b89068"/>
    <rect x="16" y="102" width="128" height="6" fill="#a37c56"/>
    <rect x="16" y="102" width="128" height="3" fill="#b89068"/>

    <!-- TOP ROW of books -->
    <rect x="20" y="14" width="14" height="38" fill="#a83b3b"/>
    <rect x="20" y="14" width="14" height="4" fill="#c14a4a"/>
    <rect x="36" y="18" width="12" height="34" fill="#3a7bd5"/>
    <rect x="36" y="18" width="12" height="4" fill="#5a9ae5"/>
    <rect x="50" y="12" width="16" height="40" fill="#2ea043"/>
    <rect x="50" y="12" width="16" height="4" fill="#4fda61"/>
    <rect x="68" y="16" width="10" height="36" fill="#d97706"/>
    <rect x="68" y="16" width="10" height="4" fill="#f0a030"/>
    <rect x="80" y="14" width="14" height="38" fill="#7c3aed"/>
    <rect x="80" y="14" width="14" height="4" fill="#9b6cf0"/>
    <rect x="96" y="18" width="12" height="34" fill="#dc2626"/>
    <rect x="96" y="18" width="12" height="4" fill="#f04040"/>
    <rect x="110" y="12" width="16" height="40" fill="#0891b2"/>
    <rect x="110" y="12" width="16" height="4" fill="#22b8cf"/>
    <rect x="128" y="16" width="12" height="36" fill="#b85a3d"/>
    <rect x="128" y="16" width="12" height="4" fill="#d06747"/>

    <!-- MIDDLE ROW of books -->
    <rect x="20" y="60" width="16" height="42" fill="#2f4858"/>
    <rect x="20" y="60" width="16" height="4" fill="#3e5c6e"/>
    <rect x="38" y="64" width="12" height="38" fill="#d97706"/>
    <rect x="38" y="64" width="12" height="4" fill="#f0a030"/>
    <rect x="52" y="58" width="14" height="44" fill="#a83b3b"/>
    <rect x="52" y="58" width="14" height="4" fill="#c14a4a"/>
    <rect x="68" y="62" width="10" height="40" fill="#3a7bd5"/>
    <rect x="68" y="62" width="10" height="4" fill="#5a9ae5"/>
    <rect x="80" y="60" width="16" height="42" fill="#16a34a"/>
    <rect x="80" y="60" width="16" height="4" fill="#4fda61"/>
    <!-- small globe/ornament -->
    <rect x="100" y="82" width="14" height="14" fill="#86c9ff" rx="0"/>
    <rect x="102" y="84" width="10" height="10" fill="#a9ddff"/>
    <rect x="105" y="96" width="4" height="6" fill="#6b4a2a"/>
    <rect x="114" y="62" width="14" height="40" fill="#7c3aed"/>
    <rect x="114" y="62" width="14" height="4" fill="#9b6cf0"/>
    <rect x="130" y="64" width="10" height="38" fill="#dc2626"/>
    <rect x="130" y="64" width="10" height="4" fill="#f04040"/>

    <!-- BOTTOM ROW of books -->
    <rect x="20" y="110" width="12" height="39" fill="#0891b2"/>
    <rect x="20" y="110" width="12" height="4" fill="#22b8cf"/>
    <rect x="34" y="114" width="14" height="35" fill="#b85a3d"/>
    <rect x="34" y="114" width="14" height="4" fill="#d06747"/>
    <rect x="50" y="108" width="16" height="41" fill="#3a7bd5"/>
    <rect x="50" y="108" width="16" height="4" fill="#5a9ae5"/>
    <rect x="68" y="112" width="10" height="37" fill="#2ea043"/>
    <rect x="68" y="112" width="10" height="4" fill="#4fda61"/>
    <rect x="80" y="110" width="14" height="39" fill="#d97706"/>
    <rect x="80" y="110" width="14" height="4" fill="#f0a030"/>
    <rect x="96" y="114" width="12" height="35" fill="#a83b3b"/>
    <rect x="96" y="114" width="12" height="4" fill="#c14a4a"/>
    <!-- leaning book -->
    <rect x="112" y="116" width="28" height="12" fill="#7c3aed"/>
    <rect x="112" y="116" width="28" height="3" fill="#9b6cf0"/>
    <rect x="114" y="130" width="14" height="19" fill="#2f4858"/>
    <rect x="114" y="130" width="14" height="4" fill="#3e5c6e"/>
    <rect x="130" y="128" width="12" height="21" fill="#dc2626"/>
    <rect x="130" y="128" width="12" height="4" fill="#f04040"/>
  </g>
</svg>
