<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel mengpaneel</title>
  <desc>Pixel mengpaneel/mixer icoon met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Mixer -->
  <g transform="translate(22 34)">
    <!-- base -->
    <rect x="0" y="0" width="156" height="112" fill="#2f2f2f"/>
    <rect x="0" y="0" width="156" height="10" fill="#454545"/>
    <rect x="0" y="102" width="156" height="10" fill="#1f1f1f"/>

    <!-- top panel -->
    <rect x="10" y="16" width="136" height="24" fill="#0b1536" opacity="0.35"/>
    <rect x="10" y="16" width="136" height="6" fill="#bfefff" opacity="0.22"/>

    <!-- knobs row -->
    <g opacity="0.98">
      <rect x="18" y="22" width="10" height="10" fill="#f2d66c"/>
      <rect x="38" y="22" width="10" height="10" fill="#f2d66c"/>
      <rect x="58" y="22" width="10" height="10" fill="#f2d66c"/>
      <rect x="78" y="22" width="10" height="10" fill="#f2d66c"/>
      <rect x="98" y="22" width="10" height="10" fill="#f2d66c"/>
      <rect x="118" y="22" width="10" height="10" fill="#f2d66c"/>
    </g>
    <rect x="18" y="22" width="10" height="3" fill="#ffeaa6"/>
    <rect x="38" y="22" width="10" height="3" fill="#ffeaa6"/>
    <rect x="58" y="22" width="10" height="3" fill="#ffeaa6"/>
    <rect x="78" y="22" width="10" height="3" fill="#ffeaa6"/>
    <rect x="98" y="22" width="10" height="3" fill="#ffeaa6"/>
    <rect x="118" y="22" width="10" height="3" fill="#ffeaa6"/>

    <!-- faders -->
    <g>
      <!-- tracks -->
      <rect x="20" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>
      <rect x="44" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>
      <rect x="68" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>
      <rect x="92" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>
      <rect x="116" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>
      <rect x="140" y="48" width="8" height="42" fill="#0b1536" opacity="0.30"/>

      <!-- sliders -->
      <rect x="18" y="66" width="12" height="8" fill="#7fd3ff"/>
      <rect x="42" y="58" width="12" height="8" fill="#7fd3ff"/>
      <rect x="66" y="72" width="12" height="8" fill="#7fd3ff"/>
      <rect x="90" y="54" width="12" height="8" fill="#7fd3ff"/>
      <rect x="114" y="76" width="12" height="8" fill="#7fd3ff"/>
      <rect x="138" y="62" width="12" height="8" fill="#7fd3ff"/>

      <!-- slider highlights -->
      <rect x="18" y="66" width="12" height="2" fill="#bfefff"/>
      <rect x="42" y="58" width="12" height="2" fill="#bfefff"/>
      <rect x="66" y="72" width="12" height="2" fill="#bfefff"/>
      <rect x="90" y="54" width="12" height="2" fill="#bfefff"/>
      <rect x="114" y="76" width="12" height="2" fill="#bfefff"/>
      <rect x="138" y="62" width="12" height="2" fill="#bfefff"/>
    </g>

    <!-- LED meter -->
    <g transform="translate(10 92)">
      <rect x="0" y="0" width="60" height="6" fill="#0b1536" opacity="0.25"/>
      <rect x="2" y="1" width="10" height="4" fill="#65f08a"/>
      <rect x="14" y="1" width="10" height="4" fill="#65f08a"/>
      <rect x="26" y="1" width="10" height="4" fill="#f2d66c"/>
      <rect x="38" y="1" width="10" height="4" fill="#f59e0b"/>
      <rect x="50" y="1" width="8" height="4" fill="#dc2626"/>
    </g>
  </g>

  <!-- stand / feet -->
  <g>
    <rect x="58" y="156" width="84" height="10" fill="#2f2f2f"/>
    <rect x="58" y="166" width="84" height="8" fill="#1f1f1f"/>
  </g>
</svg>

