<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel pakket</title>
  <desc>Pixel-pakket/parcel icoon met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Parcel / package -->
  <g transform="translate(35 35)">
    <!-- box body -->
    <rect x="0" y="40" width="130" height="90" fill="#c79a62"/>
    <rect x="0" y="40" width="130" height="12" fill="#deb075"/>
    <rect x="0" y="118" width="130" height="12" fill="#a77d4e"/>

    <!-- top lid -->
    <polygon points="0,40 35,18 130,18 130,40" fill="#d9ad73"/>
    <polygon points="0,40 35,18 35,40" fill="#c79a62"/>

    <!-- tape -->
    <rect x="58" y="18" width="14" height="112" fill="#e8d9b6"/>
    <rect x="0" y="66" width="130" height="12" fill="#e8d9b6" opacity="0.9"/>

    <!-- label -->
    <rect x="18" y="88" width="40" height="26" fill="#f3fbff"/>
    <rect x="22" y="94" width="32" height="6" fill="#86c9ff"/>
    <rect x="22" y="104" width="22" height="6" fill="#86c9ff"/>

    <!-- shadow line -->
    <rect x="0" y="52" width="130" height="4" fill="#8e6a42" opacity="0.55"/>
  </g>
</svg>
