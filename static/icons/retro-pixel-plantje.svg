<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel plantje</title>
  <desc>Pixel-plantje icoon met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Plant + pot -->
  <g transform="translate(40 25)">
    <!-- leaves -->
    <rect x="60" y="0" width="20" height="10" fill="#2ea043"/>
    <rect x="50" y="10" width="40" height="10" fill="#2ea043"/>
    <rect x="40" y="20" width="60" height="10" fill="#2ea043"/>
    <rect x="50" y="30" width="40" height="10" fill="#2ea043"/>
    <rect x="60" y="40" width="20" height="10" fill="#2ea043"/>

    <!-- leaf highlights -->
    <rect x="60" y="10" width="10" height="10" fill="#5be66d"/>
    <rect x="50" y="20" width="10" height="10" fill="#4fda61"/>
    <rect x="70" y="20" width="10" height="10" fill="#4fda61"/>
    <rect x="60" y="30" width="10" height="10" fill="#4fda61"/>

    <!-- stem -->
    <rect x="68" y="50" width="4" height="28" fill="#2b6b35"/>

    <!-- soil -->
    <rect x="30" y="78" width="80" height="10" fill="#5b402b"/>
    <rect x="30" y="88" width="80" height="6" fill="#3f2c1e"/>

    <!-- pot -->
    <rect x="25" y="94" width="90" height="50" fill="#b85a3d"/>
    <rect x="25" y="94" width="90" height="10" fill="#d06747"/>
    <rect x="25" y="134" width="90" height="10" fill="#8f442e"/>

    <!-- pot rim -->
    <rect x="20" y="86" width="100" height="10" fill="#a34f35"/>
    <rect x="20" y="86" width="100" height="4" fill="#d06747"/>

    <!-- little label -->
    <rect x="55" y="114" width="30" height="18" fill="#f3fbff"/>
    <rect x="58" y="118" width="24" height="4" fill="#86c9ff"/>
    <rect x="58" y="126" width="16" height="4" fill="#86c9ff"/>
  </g>
</svg>
