<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel pool</title>
  <desc>Pixel-zwembadje icoon met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <g>
    <!-- pool border / deck -->
    <rect x="10" y="20" width="160" height="100" fill="#e7d8b6"/>
    <rect x="10" y="20" width="160" height="10" fill="#f0e5c9"/>
    <rect x="10" y="110" width="160" height="10" fill="#d4c59f"/>

    <!-- pool tiles rim -->
    <rect x="20" y="30" width="140" height="8" fill="#86c9ff"/>
    <rect x="20" y="30" width="140" height="4" fill="#a9ddff"/>

    <!-- water body -->
    <rect x="20" y="38" width="140" height="64" fill="#3cc7ff"/>
    <!-- water depth bands -->
    <rect x="20" y="38" width="140" height="16" fill="#84e4ff"/>
    <rect x="20" y="54" width="140" height="16" fill="#5dd8ff"/>
    <rect x="20" y="70" width="140" height="16" fill="#3cc7ff"/>
    <rect x="20" y="86" width="140" height="16" fill="#28b0e8"/>

    <!-- wave highlights -->
    <rect x="30" y="42" width="20" height="4" fill="#ffffff" opacity="0.6"/>
    <rect x="60" y="46" width="30" height="4" fill="#ffffff" opacity="0.5"/>
    <rect x="110" y="42" width="25" height="4" fill="#ffffff" opacity="0.55"/>
    <rect x="40" y="60" width="15" height="4" fill="#ffffff" opacity="0.4"/>
    <rect x="80" y="58" width="20" height="4" fill="#ffffff" opacity="0.45"/>
    <rect x="120" y="62" width="18" height="4" fill="#ffffff" opacity="0.4"/>

    <!-- pool bottom tiles -->
    <rect x="20" y="96" width="140" height="6" fill="#1d9ad0"/>

    <!-- ladder left -->
    <rect x="26" y="14" width="4" height="30" fill="#c0c0c0"/>
    <rect x="38" y="14" width="4" height="30" fill="#c0c0c0"/>
    <rect x="26" y="20" width="16" height="4" fill="#d9d9d9"/>
    <rect x="26" y="30" width="16" height="4" fill="#d9d9d9"/>
    <!-- ladder highlight -->
    <rect x="26" y="14" width="4" height="4" fill="#e8e8e8"/>
    <rect x="38" y="14" width="4" height="4" fill="#e8e8e8"/>

    <!-- diving board right -->
    <rect x="140" y="10" width="8" height="24" fill="#6b4a2a"/>
    <rect x="140" y="10" width="8" height="4" fill="#8b6a4a"/>
    <rect x="120" y="10" width="28" height="6" fill="#86c9ff"/>
    <rect x="120" y="10" width="28" height="3" fill="#a9ddff"/>

    <!-- pool edge outline -->
    <rect x="20" y="38" width="140" height="2" fill="#0b1536" opacity="0.2"/>
    <rect x="20" y="100" width="140" height="2" fill="#0b1536" opacity="0.2"/>
    <rect x="20" y="38" width="2" height="64" fill="#0b1536" opacity="0.15"/>
    <rect x="158" y="38" width="2" height="64" fill="#0b1536" opacity="0.15"/>
  </g>
</svg>
