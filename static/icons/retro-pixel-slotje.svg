<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel slotje</title>
  <desc>Pixel-slot/hangslot icoon in vintage stijl.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>
  <g>
    <!-- shackle (top loop) -->
    <rect x="12" y="0" width="24" height="8" fill="#8b8b8b"/>
    <rect x="12" y="0" width="24" height="2" fill="#b0b0b0"/>
    <rect x="8" y="8" width="8" height="16" fill="#6b6b6b"/>
    <rect x="32" y="8" width="8" height="16" fill="#5a5a5a"/>
    <rect x="8" y="8" width="4" height="16" fill="#8b8b8b"/>
    <rect x="36" y="8" width="4" height="16" fill="#7a7a7a"/>
    <!-- body -->
    <rect x="8" y="24" width="32" height="36" fill="#6b6b6b"/>
    <rect x="8" y="24" width="32" height="6" fill="#8b8b8b"/>
    <rect x="8" y="54" width="32" height="6" fill="#4a4a4a"/>
    <rect x="8" y="24" width="6" height="36" fill="#7a7a7a"/>
    <rect x="34" y="24" width="6" height="36" fill="#5a5a5a"/>
    <!-- keyhole -->
    <rect x="20" y="32" width="8" height="12" fill="#2a2a2a"/>
    <rect x="22" y="36" width="4" height="4" fill="#2a2a2a"/>
    <rect x="23" y="44" width="2" height="8" fill="#2a2a2a"/>
  </g>
</svg>
