<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel verboden in te rijden</title>
  <desc>Pixel verkeersbord verboden in te rijden (rood met witte balk), transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Outer red ring (pixelated, 20px grid) -->
  <g>
    <rect x="100" y="20" width="20" height="20" fill="#dc2626"/>

    <rect x="60" y="40" width="20" height="20" fill="#dc2626"/>
    <rect x="80" y="40" width="20" height="20" fill="#dc2626"/>
    <rect x="100" y="40" width="20" height="20" fill="#dc2626"/>
    <rect x="120" y="40" width="20" height="20" fill="#dc2626"/>
    <rect x="140" y="40" width="20" height="20" fill="#dc2626"/>

    <rect x="40" y="60" width="20" height="20" fill="#dc2626"/>
    <rect x="60" y="60" width="20" height="20" fill="#dc2626"/>
    <rect x="140" y="60" width="20" height="20" fill="#dc2626"/>
    <rect x="160" y="60" width="20" height="20" fill="#dc2626"/>

    <rect x="40" y="80" width="20" height="20" fill="#dc2626"/>
    <rect x="160" y="80" width="20" height="20" fill="#dc2626"/>

    <rect x="20" y="100" width="20" height="20" fill="#dc2626"/>
    <rect x="180" y="100" width="20" height="20" fill="#dc2626"/>

    <rect x="40" y="120" width="20" height="20" fill="#dc2626"/>
    <rect x="160" y="120" width="20" height="20" fill="#dc2626"/>

    <rect x="40" y="140" width="20" height="20" fill="#dc2626"/>
    <rect x="60" y="140" width="20" height="20" fill="#dc2626"/>
    <rect x="140" y="140" width="20" height="20" fill="#dc2626"/>
    <rect x="160" y="140" width="20" height="20" fill="#dc2626"/>

    <rect x="60" y="160" width="20" height="20" fill="#c81e1e"/>
    <rect x="80" y="160" width="20" height="20" fill="#c81e1e"/>
    <rect x="100" y="160" width="20" height="20" fill="#c81e1e"/>
    <rect x="120" y="160" width="20" height="20" fill="#c81e1e"/>
    <rect x="140" y="160" width="20" height="20" fill="#c81e1e"/>

    <rect x="100" y="180" width="20" height="20" fill="#b91c1c"/>
  </g>

  <!-- Inner cutout (makes it less “flag-like”) -->
  <g>
    <rect x="80" y="60" width="40" height="20" fill="#f8fafc"/>
    <rect x="60" y="80" width="80" height="20" fill="#f8fafc"/>
    <rect x="60" y="100" width="80" height="20" fill="#f8fafc"/>
    <rect x="60" y="120" width="80" height="20" fill="#f8fafc"/>
    <rect x="80" y="140" width="40" height="20" fill="#f8fafc"/>
  </g>

  <!-- White bar (smaller, centered) -->
  <g>
    <rect x="60" y="100" width="120" height="20" fill="#f8fafc"/>
    <rect x="60" y="120" width="120" height="20" fill="#f8fafc"/>
    <rect x="66" y="104" width="108" height="4" fill="#ffffff" opacity="0.8"/>
    <!-- subtle lower shadow -->
    <rect x="60" y="136" width="120" height="4" fill="#cbd5e1" opacity="0.55"/>
  </g>
</svg>

