<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 160" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel vergrootglas</title>
  <desc>Geisoleerd pixel-vergrootglas met transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Magnifying glass (pixel) -->
  <g>
    <!-- lens ring -->
    <rect x="0" y="0" width="80" height="80" fill="#111111" opacity="0.35"/>
    <rect x="10" y="10" width="60" height="60" fill="#cfd7ff"/>
    <rect x="20" y="20" width="40" height="40" fill="#84e4ff"/>
    <rect x="24" y="24" width="20" height="8" fill="#dff6ff"/>
    <!-- hole to fake ring -->
    <rect x="18" y="18" width="44" height="44" fill="#21448a" opacity="0.25"/>
    <rect x="22" y="22" width="36" height="36" fill="#84e4ff"/>
    <!-- handle -->
    <rect x="60" y="60" width="15" height="15" fill="#111111" opacity="0.45"/>
    <rect x="75" y="75" width="20" height="20" fill="#6b4a2a"/>
    <rect x="95" y="95" width="20" height="60" fill="#6b4a2a"/>
    <rect x="95" y="95" width="5" height="60" fill="#4e3520"/>
    <rect x="95" y="150" width="20" height="10" fill="#3b2919"/>
  </g>
</svg>
