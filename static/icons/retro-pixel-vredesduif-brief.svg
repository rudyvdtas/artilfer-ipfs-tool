<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel vredesduif met brief (rechts naar links)</title>
  <desc>Pixel vredesduif met brief in zijn snavel. Transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Static dove facing LEFT -->
  <g transform="translate(60 20)">
    <!-- Mirror the base sprite so the head faces left, without leaving the viewBox -->
    <g transform="translate(180 0) scale(-1 1)">
      <!-- Wing (back) -->
      <g opacity="0.95">
        <rect x="22" y="22" width="34" height="10" fill="#f3fbff"/>
        <rect x="18" y="32" width="42" height="10" fill="#ffffff"/>
        <rect x="14" y="42" width="50" height="10" fill="#ffffff"/>
        <rect x="20" y="52" width="40" height="10" fill="#d7eefc"/>
      </g>

      <!-- Body -->
      <rect x="58" y="34" width="52" height="28" fill="#ffffff"/>
      <rect x="60" y="38" width="48" height="6" fill="#f3fbff"/>
      <rect x="60" y="56" width="48" height="6" fill="#d7eefc"/>

      <!-- Tail -->
      <rect x="38" y="44" width="20" height="6" fill="#ffffff"/>
      <rect x="32" y="50" width="26" height="6" fill="#f3fbff"/>
      <rect x="38" y="56" width="20" height="6" fill="#d7eefc"/>

      <!-- Head -->
      <rect x="110" y="32" width="18" height="16" fill="#ffffff"/>
      <rect x="112" y="34" width="14" height="4" fill="#f3fbff"/>
      <!-- Eye -->
      <rect x="122" y="38" width="2" height="2" fill="#1b1b1b" opacity="0.7"/>

      <!-- Beak -->
      <rect x="128" y="40" width="10" height="4" fill="#f2d66c"/>
      <rect x="136" y="40" width="4" height="4" fill="#e3c45f"/>

      <!-- Letter / envelope -->
      <g transform="translate(142 30)">
        <rect x="0" y="14" width="22" height="16" fill="#f3fbff"/>
        <rect x="0" y="14" width="22" height="3" fill="#ffffff"/>
        <rect x="0" y="27" width="22" height="3" fill="#d7eefc"/>
        <polygon points="0,14 11,22 22,14" fill="#cfd7ff"/>
        <polygon points="0,30 11,22 22,30" fill="#bfe7ff" opacity="0.75"/>
        <!-- tiny seal -->
        <rect x="10" y="22" width="4" height="4" fill="#ff63c3"/>
      </g>

      <!-- Wing (front) -->
      <g>
        <rect x="64" y="20" width="24" height="10" fill="#f3fbff"/>
        <rect x="56" y="30" width="40" height="10" fill="#ffffff"/>
        <rect x="52" y="40" width="48" height="10" fill="#ffffff"/>
        <rect x="60" y="50" width="36" height="10" fill="#d7eefc"/>
      </g>

      <!-- Soft outline pixels (very subtle) -->
      <g opacity="0.12" fill="#111111">
        <rect x="58" y="34" width="52" height="2"/>
        <rect x="58" y="60" width="52" height="2"/>
        <rect x="110" y="32" width="18" height="2"/>
      </g>
    </g>
  </g>
</svg>
