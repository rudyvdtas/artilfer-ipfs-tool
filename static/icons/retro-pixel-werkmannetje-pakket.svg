<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel werkmannetje met pakket</title>
  <desc>Pixel werkmannetje dat een pakket vasthoudt, transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Worker -->
  <g transform="translate(18 14)">
    <!-- shadow -->
    <rect x="36" y="170" width="92" height="8" fill="#000000" opacity="0.08"/>

    <!-- head -->
    <rect x="52" y="28" width="40" height="30" fill="#f1c9a5"/>
    <!-- face pixels -->
    <rect x="62" y="40" width="4" height="4" fill="#1b1b1b" opacity="0.7"/>
    <rect x="78" y="40" width="4" height="4" fill="#1b1b1b" opacity="0.7"/>
    <rect x="66" y="50" width="12" height="4" fill="#c58e7a" opacity="0.6"/>

    <!-- cap -->
    <rect x="46" y="18" width="52" height="14" fill="#c14a4a"/>
    <rect x="52" y="12" width="40" height="8" fill="#a83b3b"/>
    <rect x="44" y="30" width="56" height="6" fill="#8a2f2f"/>

    <!-- neck -->
    <rect x="66" y="58" width="12" height="6" fill="#e6b892"/>

    <!-- body -->
    <rect x="44" y="64" width="56" height="56" fill="#3f6fb3"/>
    <rect x="44" y="64" width="56" height="8" fill="#5c8bd1"/>
    <!-- bib / straps -->
    <rect x="50" y="72" width="8" height="30" fill="#2f5a99"/>
    <rect x="86" y="72" width="8" height="30" fill="#2f5a99"/>
    <rect x="58" y="88" width="28" height="24" fill="#2f5a99"/>
    <!-- button pixels -->
    <rect x="54" y="78" width="4" height="4" fill="#f2d66c"/>
    <rect x="90" y="78" width="4" height="4" fill="#f2d66c"/>

    <!-- left arm -->
    <rect x="34" y="74" width="10" height="34" fill="#3f6fb3"/>
    <rect x="34" y="100" width="10" height="8" fill="#2f5a99"/>
    <rect x="34" y="108" width="10" height="10" fill="#f1c9a5"/>

    <!-- right arm (holding) -->
    <rect x="100" y="78" width="22" height="10" fill="#3f6fb3"/>
    <rect x="118" y="78" width="10" height="22" fill="#3f6fb3"/>
    <rect x="118" y="96" width="10" height="10" fill="#f1c9a5"/>

    <!-- package -->
    <g transform="translate(126 66)">
      <rect x="0" y="24" width="38" height="30" fill="#c79a62"/>
      <rect x="0" y="24" width="38" height="6" fill="#deb075"/>
      <rect x="0" y="48" width="38" height="6" fill="#a77d4e"/>
      <polygon points="0,24 10,16 38,16 38,24" fill="#d9ad73"/>
      <rect x="16" y="16" width="6" height="38" fill="#e8d9b6"/>
      <rect x="0" y="36" width="38" height="6" fill="#e8d9b6" opacity="0.9"/>
      <!-- label -->
      <rect x="6" y="42" width="12" height="8" fill="#f3fbff"/>
      <rect x="7" y="44" width="10" height="3" fill="#86c9ff"/>
    </g>

    <!-- legs -->
    <rect x="52" y="120" width="18" height="40" fill="#2b3a52"/>
    <rect x="74" y="120" width="18" height="40" fill="#2b3a52"/>
    <rect x="52" y="154" width="18" height="10" fill="#1b1b1b" opacity="0.85"/>
    <rect x="74" y="154" width="18" height="10" fill="#1b1b1b" opacity="0.85"/>

    <!-- subtle outline blocks -->
    <rect x="44" y="64" width="56" height="4" fill="#111111" opacity="0.18"/>
    <rect x="44" y="116" width="56" height="4" fill="#111111" opacity="0.18"/>
  </g>
</svg>
