<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <title>Retro pixel werkmannetje met schilderij</title>
  <desc>Pixel werkmannetje dat een groot schilderij vasthoudt, transparante achtergrond.</desc>
  <defs>
    <style>
      svg { shape-rendering: crispEdges; image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Worker + painting -->
  <g transform="translate(10 12)">
    <!-- shadow -->
    <rect x="28" y="174" width="120" height="8" fill="#000000" opacity="0.08"/>

    <!-- head -->
    <rect x="42" y="22" width="40" height="30" fill="#f1c9a5"/>
    <rect x="52" y="34" width="4" height="4" fill="#1b1b1b" opacity="0.7"/>
    <rect x="68" y="34" width="4" height="4" fill="#1b1b1b" opacity="0.7"/>
    <rect x="56" y="44" width="12" height="4" fill="#c58e7a" opacity="0.6"/>

    <!-- cap -->
    <rect x="36" y="12" width="52" height="14" fill="#c14a4a"/>
    <rect x="42" y="6" width="40" height="8" fill="#a83b3b"/>
    <rect x="34" y="24" width="56" height="6" fill="#8a2f2f"/>

    <!-- neck -->
    <rect x="56" y="52" width="12" height="6" fill="#e6b892"/>

    <!-- body -->
    <rect x="34" y="58" width="56" height="56" fill="#3f6fb3"/>
    <rect x="34" y="58" width="56" height="8" fill="#5c8bd1"/>
    <!-- straps -->
    <rect x="40" y="66" width="8" height="30" fill="#2f5a99"/>
    <rect x="76" y="66" width="8" height="30" fill="#2f5a99"/>
    <rect x="48" y="82" width="28" height="24" fill="#2f5a99"/>
    <rect x="44" y="72" width="4" height="4" fill="#f2d66c"/>
    <rect x="80" y="72" width="4" height="4" fill="#f2d66c"/>

    <!-- left arm -->
    <rect x="24" y="68" width="10" height="34" fill="#3f6fb3"/>
    <rect x="24" y="92" width="10" height="10" fill="#f1c9a5"/>

    <!-- right arm (supporting frame) -->
    <rect x="90" y="72" width="18" height="10" fill="#3f6fb3"/>
    <rect x="104" y="72" width="10" height="22" fill="#3f6fb3"/>
    <rect x="104" y="90" width="10" height="10" fill="#f1c9a5"/>

    <!-- legs -->
    <rect x="42" y="114" width="18" height="44" fill="#2b3a52"/>
    <rect x="64" y="114" width="18" height="44" fill="#2b3a52"/>
    <rect x="42" y="152" width="18" height="10" fill="#1b1b1b" opacity="0.85"/>
    <rect x="64" y="152" width="18" height="10" fill="#1b1b1b" opacity="0.85"/>

    <!-- subtle outline blocks -->
    <rect x="34" y="58" width="56" height="4" fill="#111111" opacity="0.18"/>
    <rect x="34" y="110" width="56" height="4" fill="#111111" opacity="0.18"/>

    <!-- Painting (large) -->
    <g transform="translate(108 46)">
      <!-- frame -->
      <rect x="0" y="0" width="72" height="94" fill="#c79a62"/>
      <rect x="0" y="0" width="72" height="10" fill="#deb075"/>
      <rect x="0" y="84" width="72" height="10" fill="#a77d4e"/>
      <!-- inner matte -->
      <rect x="8" y="12" width="56" height="70" fill="#f3fbff"/>
      <rect x="8" y="12" width="56" height="8" fill="#bfefff"/>
      <!-- simple pixel art -->
      <rect x="14" y="26" width="40" height="8" fill="#7fd3ff"/>
      <rect x="14" y="38" width="28" height="8" fill="#65f08a"/>
      <rect x="14" y="50" width="36" height="8" fill="#f2d66c"/>
      <rect x="14" y="62" width="22" height="8" fill="#c14a4a"/>
      <!-- signature -->
      <rect x="44" y="74" width="16" height="4" fill="#0b1536" opacity="0.35"/>
      <!-- frame shadow line -->
      <rect x="0" y="10" width="72" height="4" fill="#8e6a42" opacity="0.55"/>
    </g>
  </g>
</svg>

